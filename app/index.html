<!-- app/index.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go Go Go - 알까기</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/hyperscript.org@0.9.12"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Navigation Bar -->
    <div class="nav-bar">
      <h1>
        Go Go Go
        <span class="subtitle">Real-time 알까기 Game</span>
      </h1>
      <div id="user-section">
        <span id="username-display"></span>
        <button hx-post="/api/logout" hx-target="body">Logout</button>
      </div>
    </div>

    <!-- Auth Section -->
    <div id="auth-section" class="container">
      <div class="auth-tabs">
        <button
          class="tab-btn active"
          _="on click toggle .active on me and toggle .active on #login-form"
        >
          Login
        </button>
        <button
          class="tab-btn"
          _="on click toggle .active on me and toggle .active on #signup-form"
        >
          Signup
        </button>
      </div>

      <!-- Login Form -->
      <form
        id="login-form"
        class="auth-form active"
        hx-post="/api/login"
        hx-target="#auth-section"
      >
        <input
          class="input-area"
          type="text"
          name="username"
          placeholder="Username"
          required
        />
        <input
          class="input-area"
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button type="submit">Login</button>
      </form>

      <!-- Signup Form -->
      <form
        id="signup-form"
        class="auth-form"
        hx-post="/api/signup"
        hx-target="#auth-section"
      >
        <input
          class="input-area"
          type="text"
          name="username"
          placeholder="Username"
          required
        />
        <input
          class="input-area"
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <input
          class="input-area"
          type="password"
          name="confirm_password"
          placeholder="Confirm Password"
          required
        />
        <button type="submit">Signup</button>
      </form>
    </div>

    <!-- Game Section (Hidden until authenticated) -->
    <div id="game-section" class="container" style="display: none">
      <!-- Room Management -->
      <div class="room-management">
        <h2>Game Rooms</h2>
        <div class="room-actions">
          <button
            hx-get="/api/rooms"
            hx-target="#room-list"
            hx-trigger="load, every 5s"
          >
            Refresh Rooms
          </button>
          <button hx-get="/api/rooms/create" hx-target="#create-room-modal">
            Create Room
          </button>
        </div>

        <!-- Room List -->
        <div
          id="room-list"
          class="room-list"
          hx-get="/api/rooms"
          hx-trigger="load, every 5s"
        >
          <!-- Rooms will be loaded here -->
        </div>
      </div>

      <!-- Game Board (Hidden until in a room) -->
      <div id="game-board" class="game-board" style="display: none">
        <div class="game-info">
          <h3>Room: <span id="room-name"></span></h3>
          <p>Status: <span id="game-status">Waiting for opponent...</span></p>
          <p>Turn: <span id="current-turn"></span></p>
        </div>

        <!-- Go Board -->
        <div class="board-container">
          <div
            id="go-board"
            class="go-board"
            hx-get="/api/game/board"
            hx-trigger="load, every 1s"
            _="on click 
                        if event.target.classList.contains('intersection')
                            htmx.trigger('body', 'makeMove', {x: event.target.dataset.x, y: event.target.dataset.y})"
          >
            <!-- Board will be rendered here -->
          </div>
        </div>

        <!-- Game Controls -->
        <div class="game-controls">
          <button hx-post="/api/game/surrender" hx-target="#game-board">
            Surrender
          </button>
          <button hx-post="/api/game/leave" hx-target="#game-section">
            Leave Game
          </button>
        </div>
      </div>
    </div>

    <!-- Create Room Modal -->
    <div id="create-room-modal" class="modal" style="display: none">
      <div class="modal-content">
        <h3>Create New Room</h3>
        <form hx-post="/api/rooms" hx-target="#room-list">
          <input
            type="text"
            name="room_name"
            placeholder="Room Name"
            required
          />
          <div class="button-container">
            <button type="submit">Create</button>
            <button type="button" _="on click hide #create-room-modal">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <script>
      // Handle authentication state
      document.body.addEventListener("htmx:afterRequest", function (evt) {
        if (
          evt.detail.pathInfo.requestPath === "/api/login" ||
          evt.detail.pathInfo.requestPath === "/api/signup"
        ) {
          if (evt.detail.successful) {
            document.getElementById("auth-section").style.display = "none";
            document.getElementById("game-section").style.display = "block";
          }
        }
      });

      // Handle game moves
      document.body.addEventListener("makeMove", function (evt) {
        const { x, y } = evt.detail;
        htmx.ajax("POST", "/api/game/move", {
          target: "#go-board",
          values: { x, y },
        });
      });
    </script>
  </body>
</html>
